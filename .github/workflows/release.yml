name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: denoland/setup-deno@e95548e56dfa95d4e1a28d6f422fafe75c4c26fb # v2.0.3
        with:
          deno-version: v2.x

      - name: Validate release version
        shell: bash
        run: |
          MANIFEST_VERSION="$(deno eval 'console.log(JSON.parse(Deno.readTextFileSync("deno.json")).version)')"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            TAG_VERSION="${GITHUB_REF_NAME#v}"
            if [[ "${TAG_VERSION}" != "${MANIFEST_VERSION}" ]]; then
              echo "tag version ${TAG_VERSION} does not match deno.json version ${MANIFEST_VERSION}" >&2
              exit 1
            fi
          fi

      - name: Check types
        run: deno task check

      - name: Run tests
        run: deno task test

  build:
    needs: verify
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            binary_name: sikret
          - target: x86_64-apple-darwin
            binary_name: sikret
          - target: aarch64-apple-darwin
            binary_name: sikret

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: denoland/setup-deno@e95548e56dfa95d4e1a28d6f422fafe75c4c26fb # v2.0.3
        with:
          deno-version: v2.x

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="$(deno eval 'console.log(JSON.parse(Deno.readTextFileSync("deno.json")).version)')"
          fi
          echo "value=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Compile binary
        shell: bash
        run: |
          mkdir -p dist
          deno compile \
            --allow-read \
            --allow-env \
            --allow-run \
            --target "${{ matrix.target }}" \
            --output "dist/${{ matrix.binary_name }}" \
            cli.ts

      - name: Package archive
        id: package
        shell: bash
        run: |
          ARCHIVE="sikret-v${{ steps.version.outputs.value }}-${{ matrix.target }}.tar.gz"
          tar -C dist -czf "${ARCHIVE}" "${{ matrix.binary_name }}"

          echo "archive=${ARCHIVE}" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: sikret-${{ matrix.target }}
          path: ${{ steps.package.outputs.archive }}

  publish:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: sikret-*
          merge-multiple: true
          path: release-assets

      - name: Generate checksums
        shell: bash
        run: |
          (
            cd release-assets
            sha256sum sikret-* > SHA256SUMS.txt
          )

      - uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          files: |
            release-assets/*
          generate_release_notes: true
